name: Lock pinch zoom

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lock-pinch-zoom.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Disable pinch zoom and refresh PWA cache
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          index = Path('index.html')
          text = index.read_text(encoding='utf-8-sig')
          replacement = '<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />'
          updated, count = re.subn(r'<meta\s+name=["\']viewport["\']\s+content=["\'][^"\']*["\']\s*/?>', replacement, text, count=1, flags=re.IGNORECASE)
          if count != 1: raise SystemExit('Expected exactly one viewport meta tag')
          index.write_text(updated, encoding='utf-8')
          sw = Path('sw.js')
          if sw.exists():
              sw_text = sw.read_text(encoding='utf-8')
              sw_text = re.sub(r"(const\s+CACHE_VERSION\s*=\s*['\"])([^'\"]+)(['\"]\s*;)", lambda m: m.group(1) + (m.group(2) if m.group(2).endswith('-no-pinch-zoom') else m.group(2) + '-no-pinch-zoom') + m.group(3), sw_text, count=1)
              sw.write_text(sw_text, encoding='utf-8')
          Path('.github/workflows/lock-pinch-zoom.yml').unlink()
          PY
      - name: Commit migration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html sw.js .github/workflows/lock-pinch-zoom.yml
          git commit -m 'fix: disable accidental pinch zoom' || exit 0
          git push
