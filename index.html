<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#102331" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Wallet" />
  <title>My Wallet</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="apple-touch-icon" href="icons/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow" data-i18n="tagline">Personal finance command center</div>
        <h1 id="greeting">My Wallet</h1>
      </div>
      <button class="icon-btn" id="help-btn" aria-label="Help">?</button>
    </header>

    <main id="main" class="view" tabindex="-1"></main>

    <nav class="tabbar" aria-label="Main navigation">
      <button class="tab active" data-view="dashboard"><span class="tab-icon">🏠</span><span data-label="home">Home</span></button>
      <button class="tab" data-view="banking"><span class="tab-icon">🏦</span><span data-label="banking">Banking</span></button>
      <button class="tab" data-view="cards"><span class="tab-icon">💳</span><span data-label="cards">Cards</span></button>
      <button class="tab" data-view="transactions"><span class="tab-icon">🧾</span><span data-label="transactions">Transactions</span></button>
      <button class="tab" data-view="transfers"><span class="tab-icon">🔁</span><span data-label="transfers">Transfers</span></button>
      <button class="tab" data-view="goals"><span class="tab-icon">🎯</span><span data-label="goals">Goals</span></button>
      <button class="tab" data-view="settings"><span class="tab-icon">⚙️</span><span data-label="settings">Settings</span></button>
    </nav>
  </div>

  <section id="onboarding" class="onboarding hidden" aria-live="polite"></section>
  <div id="modal" class="modal hidden" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js?v=2"></script>
  <script src="ui-fixes.js?v=1"></script>
  <script src="card-remove.js?v=1"></script>
  <script src="fund-edit.js?v=2"></script>
  <script src="fund-remove.js?v=2"></script>
  <script src="account-edit.js?v=1"></script>
</body>
</html>
